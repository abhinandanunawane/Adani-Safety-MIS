<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Adani Safety MIS — Insights</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Adani Safety MIS — Insights preview for Power BI: domains, filters, KPI tiles, charts, and detail table. Fixed 1280×720. Sample data."
    />
    <meta name="theme-color" content="#006db6" />
    <!-- Brand palette: #00B16B #006DB6 #8E278F #F04C23 — solid fills in styles-alt.css -->
    <meta name="color-scheme" content="light" />
    <link rel="canonical" href="insights.html" />
    <style>
      html {
        font-family: "Segoe UI", "Segoe UI Variable", system-ui, sans-serif;
      }
      .top-header {
        display: flex !important;
        flex-shrink: 0;
        align-items: stretch;
        justify-content: space-between;
        min-height: 58px;
        height: 58px;
        padding: 0 14px 0 0;
      }
      .top-header__logo-wrap {
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
        flex-shrink: 0;
        height: 100%;
        padding: 4px 12px 4px 10px;
        background: #ffffff;
        border-radius: 0 8px 8px 0;
        box-sizing: border-box;
      }
      .top-header__titles {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 10px 0 14px;
      }
      .top-header__logo-wrap img {
        height: 50px;
        width: auto;
        max-height: 50px;
        object-fit: contain;
        display: block;
      }
    </style>
    <link rel="stylesheet" href="styles.css?v=20260618" />
    <link rel="stylesheet" href="styles-alt.css?v=20260618" />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  </head>
  <body>
    <a class="skip-link" href="#app-root">Skip to main content</a>

    <div class="shell shell--modern" data-app-shell data-layout="insights">
      <header class="top-header" role="banner">
        <div class="top-header__logo-wrap">
          <img
            src="./assets/logo11.png"
            width="200"
            height="50"
            alt="Adani safetyverse"
            decoding="async"
          />
        </div>
        <div class="top-header__titles">
          <h1>Adani Safety MIS</h1>
          <p class="top-header__subtitle">Insights · KPI exploration</p>
        </div>
        <div class="top-header__meta">
          <nav class="top-header__nav" aria-label="Primary">
            <a class="top-nav-link" id="nav-home" href="#landing">Home</a>
            <span class="header-sep" aria-hidden="true">|</span>
            <a class="top-nav-link" id="nav-categories" href="#categories">Categories</a>
          </nav>
          <span class="header-sep" aria-hidden="true">|</span>
          <span class="last-updated"
            >Last updated <time id="header-updated">-</time></span
          >
        </div>
      </header>

      <main
        id="app-root"
        class="viewport__main viewport__main--modern"
        role="main"
        tabindex="-1"
        aria-label="Adani Safety MIS Insights: safety KPI exploration and detail data"
      ></main>

      <footer class="app-footer" role="contentinfo" aria-label="Legal and data disclaimer">
        <p class="app-footer__text">
          <strong>Disclaimer:</strong> Sample data for preview—not operational reporting. Confirm figures in your governed Power BI workspace.
        </p>
      </footer>
    </div>

    <div
      id="sr-live"
      class="visually-hidden"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script defer src="embedded-data.js?v=20260412"></script>
    <script defer src="app-modern.js?v=20260618"></script>
  </body>
</html>
