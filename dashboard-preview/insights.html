<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Adani Safety Performance Profile — Insights</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Adani Safety Performance Profile — Insights preview: same features as the dashboard (domains, filters, KPIs, charts, table, comparison, PDF export) with the Insights layout. Fixed canvas. Sample data."
    />
    <meta name="theme-color" content="#006db6" />
    <meta name="color-scheme" content="light" />
    <link rel="canonical" href="insights.html" />
    <!-- Critical: header matches dashboard (styles.css) if main CSS is blocked -->
    <style>
      html {
        font-family: "Segoe UI", "Segoe UI Variable", system-ui, sans-serif;
      }
      .top-header {
        display: flex !important;
        flex-shrink: 0;
        align-items: stretch;
        justify-content: space-between;
        min-height: 58px;
        height: 58px;
        padding: 0 14px 0 0;
        background: #ffffff;
        color: #231f20;
        border-bottom: 3px solid #8e278f;
        box-sizing: border-box;
      }
      .top-header__logo-wrap {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        flex-shrink: 0;
        height: 100%;
        padding: 0 12px 0 10px;
        background: transparent;
        border-radius: 0;
        box-sizing: border-box;
      }
      .top-header__titles {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 0 10px 0 14px;
      }
      .top-header__titles h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
        line-height: 1.15;
        color: #8e278f;
      }
      .top-header__subtitle {
        margin: 0;
        font-size: 0.7rem;
        color: #6d6e71;
      }
      .top-header__logo-wrap img {
        height: auto;
        width: auto;
        max-height: max-content;
        flex-shrink: 0;
        display: block;
        object-fit: contain;
      }
      .top-header__meta {
        color: #6d6e71;
      }
      .last-updated {
        font-size: 12px;
        white-space: nowrap;
        color: #6d6e71;
      }
    </style>
    <link rel="stylesheet" href="styles.css?v=20260413b" />
    <link rel="stylesheet" href="styles-alt.css?v=20260413b" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      crossorigin=""
    />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  </head>
  <body>
    <a class="skip-link" href="#app-root">Skip to main content</a>

    <div class="shell shell--modern" data-app-shell data-layout="insights">
      <header class="top-header" role="banner">
        <div class="top-header__logo-wrap">
          <img
            src="./assets/logo11.png"
            width="180"
            height="45"
            alt="Adani safetyverse"
            decoding="async"
          />
        </div>
        <div class="top-header__titles">
          <h1>Adani Safety Performance Profile</h1>
        </div>
        <div class="top-header__meta">
          <nav class="top-header__nav" aria-label="Primary">
            <a class="top-nav-link" id="nav-home" href="#landing">Home</a>
            <span class="header-sep" aria-hidden="true">|</span>
            <a class="top-nav-link" id="nav-categories" href="#categories">Categories</a>
          </nav>
          <span class="header-sep" aria-hidden="true">|</span>
          <span class="last-updated"
            >Last updated <time id="header-updated">-</time></span
          >
        </div>
      </header>

      <main
        id="app-root"
        class="viewport__main viewport__main--modern"
        role="main"
        tabindex="-1"
        aria-label="Adani Safety Performance Profile Insights: safety KPI exploration and detail data"
      ></main>

      <footer class="app-footer" role="contentinfo" aria-label="Legal and data disclaimer">
        <p class="app-footer__text">
          <strong>Disclaimer:</strong> Sample data for preview—not operational reporting. Confirm figures in your governed Power BI workspace.
        </p>
      </footer>
    </div>

    <div
      id="sr-live"
      class="visually-hidden"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    ></div>

    <script>
      if (typeof window.__GOOGLE_MAPS_API_KEY__ === "undefined") {
        window.__GOOGLE_MAPS_API_KEY__ = "";
      }
    </script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"
      crossorigin="anonymous"
    ></script>
    <script
      defer
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      crossorigin=""
    ></script>
    <script defer src="embedded-data.js?v=20260611"></script>
    <script defer src="app.js?v=20260627"></script>
  </body>
</html>
